<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Car Cover System</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: Arial, sans-serif; }
        
        #dashboard {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 30px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        button {
            padding: 10px 20px; margin: 5px; font-size: 16px; cursor: pointer;
            border: none; border-radius: 5px; color: white; font-weight: bold;
        }
        .btn-open { background-color: #28a745; }
        .btn-close { background-color: #dc3545; }
    </style>
</head>
<body>

    <div id="dashboard">
        <h3 style="margin-top: 0; color: #333;">360 Car Cover Control</h3>
        <button class="btn-open" onclick="deployCover()">Deploy Cover ⛺</button>
        <button class="btn-close" onclick="removeCover()">Remove Cover 🚙</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 4, 6); 
        
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Roshni
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(10, 20, 10);
        scene.add(directionalLight);

        // Zameen
        const floorGeometry = new THREE.PlaneGeometry(15, 15);
        const floorMaterial = new THREE.MeshStandardMaterial({ color: 0x555555, side: THREE.DoubleSide });
        const floor = new THREE.Mesh(floorGeometry, floorMaterial);
        floor.rotation.x = Math.PI / 2;
        scene.add(floor);

        // 🌟 NAYA: Proper 3D Car Assemble Karna (THREE.Group)
        const car = new THREE.Group();

        // 1. Car ka Base (Chassis)
        const chassisGeo = new THREE.BoxGeometry(2, 0.5, 4);
        const carMat = new THREE.MeshStandardMaterial({ color: 0xcc0000 }); // Laal rang
        const chassis = new THREE.Mesh(chassisGeo, carMat);
        chassis.position.y = 0.5;
        car.add(chassis);

        // 2. Car ka Upar wala hissa (Cabin)
        const cabinGeo = new THREE.BoxGeometry(1.5, 0.5, 2);
        const cabin = new THREE.Mesh(cabinGeo, carMat);
        cabin.position.y = 1;
        cabin.position.z = -0.5; // Thoda peeche ki taraf set kiya
        car.add(cabin);

        // 3. Pahiye (Wheels) banane ka function
        function createWheel(x, z) {
            const wheelGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.2, 32);
            const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111 }); // Kaala rang
            const wheel = new THREE.Mesh(wheelGeo, wheelMat);
            wheel.rotation.z = Math.PI / 2; // Pahiye ko seedha khada karna
            wheel.position.set(x, 0.4, z);
            car.add(wheel);
        }

        // Chaaron pahiye lagana (x, z coordinates ke hisaab se)
        createWheel(1.1, 1.2);   // Aage Right
        createWheel(-1.1, 1.2);  // Aage Left
        createWheel(1.1, -1.2);  // Peeche Right
        createWheel(-1.1, -1.2); // Peeche Left

        scene.add(car);

        // Car Cover (Thoda aur bada kar diya taaki nayi gaadi fit ho jaye)
        const coverGeometry = new THREE.BoxGeometry(2.6, 1.8, 4.6);
        const coverMaterial = new THREE.MeshStandardMaterial({ color: 0x2c3e50, transparent: true, opacity: 0.95 });
        const coverBox = new THREE.Mesh(coverGeometry, coverMaterial);
        coverBox.position.y = 5; 
        scene.add(coverBox);

        // Animation Logic
        let isDeploying = false;
        let isRemoving = false;

        function deployCover() { isDeploying = true; isRemoving = false; }
        function removeCover() { isRemoving = true; isDeploying = false; }

        function animate() {
            requestAnimationFrame(animate);
            controls.update(); 
            
            if (isDeploying && coverBox.position.y > 0.9) {
                coverBox.position.y -= 0.05; 
            }
            if (isRemoving && coverBox.position.y < 5) {
                coverBox.position.y += 0.05; 
            }
            
            renderer.render(scene, camera);
        }
        
        animate();
    </script>
</body>
</html>
