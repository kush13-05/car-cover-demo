<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Car Cover System</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: Arial, sans-serif; }
        
        /* Yeh humara UI/Dashboard hai jo 3D screen ke upar dikhega */
        #dashboard {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 30px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        button {
            padding: 10px 20px; margin: 5px; font-size: 16px; cursor: pointer;
            border: none; border-radius: 5px; color: white; font-weight: bold;
        }
        .btn-open { background-color: #28a745; }
        .btn-close { background-color: #dc3545; }
    </style>
</head>
<body>

    <div id="dashboard">
        <h3 style="margin-top: 0; color: #333;">360 Car Cover Control</h3>
        <button class="btn-open" onclick="deployCover()">Deploy Cover ⛺</button>
        <button class="btn-close" onclick="removeCover()">Remove Cover 🚙</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <script>
        // 1. SCENE & CAMERA & RENDERER
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 4, 6); 
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // 2. LIGHTING (Roshni)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(10, 20, 10);
        scene.add(directionalLight);

        // 3. ZAMEEN (Road/Floor)
        const floorGeometry = new THREE.PlaneGeometry(15, 15);
        const floorMaterial = new THREE.MeshStandardMaterial({ color: 0x555555, side: THREE.DoubleSide });
        const floor = new THREE.Mesh(floorGeometry, floorMaterial);
        floor.rotation.x = Math.PI / 2; // Flat karne ke liye
        scene.add(floor);

        // 4. CAR (Red Box)
        const carGeometry = new THREE.BoxGeometry(2, 1, 4);
        const carMaterial = new THREE.MeshStandardMaterial({ color: 0xcc0000 });
        const carBox = new THREE.Mesh(carGeometry, carMaterial);
        carBox.position.y = 0.5; // Zameen ke theek upar
        scene.add(carBox);

        // 5. CAR COVER (Blue Box) - Thoda bada aur halka transparent
        const coverGeometry = new THREE.BoxGeometry(2.2, 1.2, 4.2);
        const coverMaterial = new THREE.MeshStandardMaterial({ color: 0x2c3e50, transparent: true, opacity: 0.95 });
        const coverBox = new THREE.Mesh(coverGeometry, coverMaterial);
        coverBox.position.y = 5; // Shuru mein hawa mein chhipa rahega
        scene.add(coverBox);

        // 6. ANIMATION LOGIC (Buttons se control hoga)
        let isDeploying = false;
        let isRemoving = false;

        function deployCover() {
            isDeploying = true;
            isRemoving = false;
        }

        function removeCover() {
            isRemoving = true;
            isDeploying = false;
        }

        // 7. ANIMATION LOOP (Lagatar chalne wala cycle)
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); 
            
            // Jaise hi button dabega, cover niche aayega
            if (isDeploying && coverBox.position.y > 0.6) {
                coverBox.position.y -= 0.05; 
            }
            // Jab dusra button dabega, cover upar jayega
            if (isRemoving && coverBox.position.y < 5) {
                coverBox.position.y += 0.05; 
            }
            
            renderer.render(scene, camera);
        }
        
        animate();
    </script>
</body>
</html>
